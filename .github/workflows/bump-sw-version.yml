# .github/workflows/bump-sw-version.yml
#
# Automatically bumps the CACHE_VERSION in sw.js on every push to main.
# This forces iOS PWA users to get the latest code without reinstalling.
#
# The version becomes: moodlog-vYYYYMMDD-HHMM  (e.g. moodlog-v20260605-1430)
# so you can always tell exactly when the cache was last updated.

name: Bump SW Cache Version

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Bump CACHE_VERSION in sw.js
        run: |
          # Build a timestamp string like moodlog-v20260605-1430
          NEW_VERSION="moodlog-v$(date -u +'%Y%m%d-%H%M')"
          echo "New version: $NEW_VERSION"

          # Replace the CACHE_VERSION line in sw.js
          sed -i "s/const CACHE_VERSION = '.*'/const CACHE_VERSION = '$NEW_VERSION'/" sw.js

          # Confirm the change
          grep "CACHE_VERSION" sw.js

      - name: Commit and push updated sw.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          # Only commit if sw.js actually changed (it always should, but just in case)
          git diff --staged --quiet || git commit -m "chore: bump SW cache version [skip ci]"
          git push
